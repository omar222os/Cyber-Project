<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Directory - Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 40px; }
        .search-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .error-box { display: none; font-family: monospace; white-space: pre-wrap; }
        .query-log { font-family: monospace; background-color: #e9ecef; padding: 10px; border-radius: 5px; font-size: 0.9srem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>Internal Personnel Directory</h2>
                <div id="welcomeMessage" class="text-muted small"></div>
            </div>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Log Out</button>
        </div>

        <!-- Search Controls -->
        <div class="search-container mb-4">
            <form id="searchForm" class="row g-3 align-items-center">
                <div class="col-md-6">
                    <label class="visually-hidden" for="usernameSearch">Search Username</label>
                    <input type="text" class="form-control" id="usernameSearch" placeholder="Search employee usernames...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="endpointToggle">
                        <option value="vulnerable" selected>Target: Vulnerable Endpoint</option>
                        <option value="secure">Target: Secure Endpoint</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Execute Query</button>
                </div>
            </form>
        </div>

        <!-- Debugging Dashboard (Crucial for SQLi Presentations) -->
        <div class="card border-warning mb-4">
            <div class="card-header bg-warning text-dark fw-bold">Live Execution Logs (Front-End Debugger)</div>
            <div class="card-body bg-light">
                <h6>Executed Query String on Backend:</h6>
                <div id="queryLog" class="query-log text-secondary">No query executed yet.</div>
                
                <!-- Error Box for Error-Based SQLi Demonstration -->
                <div id="errorBox" class="alert alert-danger error-box mt-3">
                    <strong>Database Error Returned:</strong>
                    <div id="errorText" class="mt-2"></div>
                </div>
            </div>
        </div>

        <!-- Data Results Table -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Password / Hash</th>
                            <th>Role</th>
                            <th>Email</th>
                            <th>Salary</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">Enter a search term to fetch live database records.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        // Display logged-in user context if available from login bypass
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user) {
                document.getElementById('welcomeMessage').innerText = `Authenticated Session: ${user.username} (${user.role})`;
            }
        });

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchValue = document.getElementById('usernameSearch').value;
            const endpointType = document.getElementById('endpointToggle').value;
            
            // Map cleanly to your teammate's routes/users.js endpoints
            const endpoint = endpointType === 'vulnerable' 
                ? `${API_BASE_URL}/users/search?username=${encodeURIComponent(searchValue)}`
                : `${API_BASE_URL}/users/secure-search?username=${encodeURIComponent(searchValue)}`;

            // Reset UI states
            document.getElementById('errorBox').style.display = 'none';
            const tableBody = document.getElementById('resultsTable');
            tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-3">Querying database...</td></tr>';

            try {
                const response = await fetch(endpoint);
                const data = await response.json();

                // Log the executed query if returned by the backend
                if (data.query) {
                    document.getElementById('queryLog').innerText = data.query;
                } else {
                    document.getElementById('queryLog').innerText = endpointType === 'secure' 
                        ? "SELECT ... FROM users WHERE username LIKE ?" 
                        : "No query visualization provided by backend.";
                }

                if (response.ok && data.success) {
                    tableBody.innerHTML = '';
                    
                    if (data.results.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-3">No matching records found.</td></tr>';
                        return;
                    }

                    // Render rows dynamically mapping columns to init.sql schema
                    data.results.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.id !== undefined ? row.id : 'N/A'}</td>
                            <td><strong>${row.username || 'N/A'}</strong></td>
                            <td class="text-monospace text-danger">${row.password || 'N/A'}</td>
                            <td><span class="badge bg-secondary">${row.role || 'N/A'}</span></td>
                            <td>${row.email || 'N/A'}</td>
                            <td>$${row.salary !== undefined ? row.salary : 'N/A'}</td>
                        `;
                        tableBody.appendChild(tr);
                    });
                } else {
                    // Handle custom backend error payloads (Crucial for Error-Based Injection)
                    showError(data.error || data.message || 'Unknown backend error occurred.');
                }

            } catch (err) {
                showError(`Failed to communicate with API server at ${API_BASE_URL}. Ensure your backend server is running.`);
            }
        });

        function showError(message) {
            document.getElementById('resultsTable').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Database processing halted. Check error logs.</td></tr>';
            document.getElementById('errorText').innerText = message;
            document.getElementById('errorBox').style.display = 'block';
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة المرعبين المحدودة</title>
    <link rel="icon" type="image/x-icon" href="mared.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pt-5">
    <div class="container">
        <!-- Top Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Employees Search Engine</h2>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Log Out</button>
        </div>

        <!-- Search Controls -->
        <form id="searchForm" class="bg-white p-4 rounded shadow-sm mb-4 d-flex gap-3 align-items-center">
            <input type="text" class="form-control" id="usernameSearch" placeholder="Search employee usernames..." required>
            <button type="submit" class="btn btn-primary px-4">Search</button>
        </form>

        <!-- Data Results Table -->
        <div class="card shadow-sm">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Salary</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">Enter a search term to fetch live database records.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchValue = document.getElementById('usernameSearch').value;
            const tableBody = document.getElementById('resultsTable');
            tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-3">Querying database...</td></tr>';

            try {
                const response = await fetch(`${API_BASE_URL}/users/search?username=${encodeURIComponent(searchValue)}`);
                const data = await response.json();

                if (response.ok && data.success) {
                    if (data.results.length === 0) {
                        return tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-3">No matching records found.</td></tr>';
                    }

                    // Render rows efficiently using map
                    tableBody.innerHTML = data.results.map(row => `
                        <tr>
                            <td>${row.id ?? 'N/A'}</td>
                            <td><strong>${row.username || 'N/A'}</strong></td>
                            <td><span class="badge bg-secondary">${row.role || 'N/A'}</span></td>
                            <td>${row.email || 'N/A'}</td>
                            <td>$${row.salary ?? 'N/A'}</td>
                        </tr>
                    `).join('');
                } else {
                    throw new Error(data.error || data.message || 'Unknown backend error occurred.');
                }
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Database processing halted. Check error logs.</td></tr>';
                // Preserved the alert for your SQL injection error demonstrations
                alert("SQL ERROR INTERCEPTED:\n\n" + err.message);
            }
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = '/'; 
        }
    </script>
</body>
</html>

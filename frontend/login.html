<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>تسجيل دخول المرعبين </title>
        <link rel="icon" type="image/x-icon" href="mared.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 450px; margin: 100px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #errorBox { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Employee Login</h3>
                
                <div id="errorBox" class="alert alert-danger" style="font-family: monospace; font-size: 0.85em;"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop standard form submission
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save user info to local storage to simulate a session
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirect to the directory page
                    window.location.href = 'directory.html';
                } else {
                    // Show custom error or raw SQL error for Error-Based SQLi
                    errorBox.style.display = 'block';
                    errorBox.innerHTML = `<strong>Error:</strong> ${data.message} <br><br> ${data.error ? `<strong>DB Error:</strong> ${data.error}<br><strong>Query:</strong> ${data.query}` : ''}`;
                }
            } catch (error) {
                errorBox.style.display = 'block';
                errorBox.textContent = "Failed to connect to the server.";
            }
        });
    </script>
</body>
</html>

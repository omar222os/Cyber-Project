services:
  mysql:
    image: mysql:8.0
    container_name: sqli-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sqli_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-sqli_demo}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - sqli-net

  api:
    build: ./backend  # Ensure this points to your backend folder
    container_name: sqli-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sqli_root_pass}
      DB_NAME: ${DB_NAME:-sqli_demo}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sqli-net

  frontend:
    build: 
      context: ./frontend              # The folder where your HTML files are
      dockerfile: frontend.Dockerfile  # The specific name of your Dockerfile
    container_name: sqli-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - sqli-net

networks:
  sqli-net:
    driver: bridge

volumes:
  mysql_data:
